      { text: "One-to-many — serving a community or a classroom rather than individuals", em: "", weights: { education: 5, educator: 4, hybrid: 2 } },
      { text: "Relationships with farmers, animal owners, or growers in an ongoing advisory role", em: "", weights: { agro: 4, vet: 3, hybrid: 2 } },
    ]
  },
  {
    text: "When you imagine your ideal workweek, what does it look like?",
    options: [
      { text: "A focused schedule of back-to-back client appointments, then done", em: "", weights: { clinic: 4, virtual: 3 } },
      { text: "A mix of clients, creating content or products, and some freedom in between", em: "", weights: { hybrid: 5, education: 3, virtual: 2 } },
      { text: "Mostly working independently — in a lab, a field, or on my computer", em: "", weights: { dispensary: 4, agro: 4, education: 2 } },
      { text: "Teaching, hosting calls, leading a community — always in service of a group", em: "", weights: { education: 4, educator: 5, hybrid: 2 } },
    ]
  },
  {
    text: "How do you feel about creating products — kits, formulas, curated remedy sets?",
    options: [
      { text: "I love this and could spend hours on it — it feels like art to me", em: "", weights: { dispensary: 5, acute: 3, hybrid: 2 } },
      { text: "I'd enjoy offering some products alongside my clinical work", em: "", weights: { hybrid: 3, clinic: 2, virtual: 2, acute: 2 } },
      { text: "It's not really my thing — I prefer the relationship over the product", em: "", weights: { clinic: 3, educator: 3, education: 2 } },
      { text: "I'm open to it if someone else handles the logistics", em: "", weights: { virtual: 3, agro: 2, hybrid: 2 } },
    ]
  },
  {
    text: "How important is physical location to your ideal practice?",
    options: [
      { text: "Very — I want a real place that feels like mine in my community", em: "", weights: { clinic: 5, vet: 2 } },
      { text: "Not at all — I want total location freedom", em: "", weights: { virtual: 5, education: 3, hybrid: 2 } },
      { text: "I want to be in nature or rural settings — location matters but not a clinic", em: "", weights: { agro: 5, vet: 3 } },
      { text: "Somewhere in between — I'd like a home base but not to be tied to it", em: "", weights: { hybrid: 4, virtual: 2, dispensary: 2 } },
    ]
  },
  {
    text: "What draws you most to homeopathy as a profession?",
    options: [
      { text: "The depth of the individual case — reading the whole person and finding the simillimum", em: "", weights: { clinic: 4, virtual: 3, educator: 3 } },
      { text: "The remedy itself — the intelligence of the materia medica, the art of preparation", em: "", weights: { dispensary: 4, acute: 3, education: 2 } },
      { text: "The breadth — that it works for humans, animals, plants, ecosystems", em: "", weights: { agro: 4, vet: 3, hybrid: 3 } },
      { text: "The mission — making this medicine accessible and educating others about it", em: "", weights: { education: 4, educator: 5, hybrid: 3 } },
    ]
  },
  {
    text: "Finally — when you picture yourself five years from now, what's the version that excites you most?",
    options: [
      { text: "A thriving local practice with a full client list and a reputation in my community", em: "", weights: { clinic: 5, vet: 3 } },
      { text: "A fully remote practice — clients everywhere, working from anywhere", em: "", weights: { virtual: 5, education: 2, hybrid: 2 } },
      { text: "A known name in homeopathy education — courses, a community, practitioners I've trained", em: "", weights: { educator: 5, education: 4, hybrid: 2 } },
      { text: "A multi-stream practice that's uniquely mine — clients, products, content, and community", em: "", weights: { hybrid: 6, education: 2, virtual: 2 } },
      { text: "Deep in a niche — animals, plants, or acute care — where I'm truly the expert", em: "", weights: { vet: 4, agro: 4, acute: 4 } },
    ]
  },
];

// ─── App state ────────────────────────────────────────────────────────────────
let currentQ = -1; // -1 = intro
let answers  = {}; // questionIndex -> optionIndex

function getScores() {
  const scores = {};
  Object.keys(OUTCOMES).forEach(k => scores[k] = 0);
  Object.entries(answers).forEach(([qi, oi]) => {
    const q = QUESTIONS[parseInt(qi)];
    const w = q.options[oi].weights;
    Object.entries(w).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  });
  return scores;
}

function getTopResults(n = 3) {
  const scores = getScores();
  const total  = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  return Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, n)
    .map(([key, score]) => ({ key, score, pct: Math.round((score / total) * 100) }));
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if (currentQ === -1) {
    app.innerHTML = `
      <div class="intro-card">
        <div class="intro-eyebrow">Practitioner Blueprint</div>
        <div class="intro-title">Find Your Practice <span>Alignment</span></div>
        <p class="intro-body">There's no single right way to build a homeopathic practice. This quiz helps you discover which business models align with your natural energy, strengths, and vision — so you can build something that's genuinely yours.</p>
        <button class="btn-start" onclick="startQuiz()">Begin the Quiz</button>
        <p class="intro-meta">${QUESTIONS.length} questions &nbsp;·&nbsp; About 4 minutes</p>
      </div>`;
    return;
  }

  if (currentQ >= QUESTIONS.length) {
    renderResults();
    return;
  }

  const q   = QUESTIONS[currentQ];
  const pct = Math.round(((currentQ) / QUESTIONS.length) * 100);
  const sel = answers[currentQ];

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Question ${currentQ + 1} of ${QUESTIONS.length}</span>
        <span>${pct}% complete</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="question-card">
      <div class="q-number">Question ${currentQ + 1}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      <div class="options-list">
        ${q.options.map((o, i) => `
          <button class="option-btn ${sel === i ? 'selected' : ''}" onclick="selectOption(${i})">
            <div class="option-dot"><div class="option-dot-inner"></div></div>
            <div class="option-text">${o.text}${o.em ? `<em>${o.em}</em>` : ''}</div>
          </button>`).join('')}
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-back" onclick="goBack()" ${currentQ === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
      <button class="btn-next ${sel !== undefined ? 'enabled' : ''}" onclick="goNext()">
        ${currentQ === QUESTIONS.length - 1 ? 'See my results →' : 'Next →'}
      </button>
    </div>`;
}

function renderResults() {
  const top = getTopResults(3);
  const app = document.getElementById('app');

  const cards = top.map((r, i) => {
    const o = OUTCOMES[r.key];
    const isPrimary = i === 0;
    const rankLabel = ['Primary alignment', 'Secondary alignment', 'Also a strong fit'][i];
    return `
      <div class="result-card ${isPrimary ? 'primary' : ''}">
        <div class="result-rank ${isPrimary ? '' : 'secondary'}">${rankLabel}</div>
        <div class="result-name">${o.name}</div>
        <div class="result-tagline">${o.tagline}</div>
        <div class="match-bar-wrap">
          <div class="match-bar-label">
            <span>Alignment match</span>
            <span class="match-pct">${r.pct}%</span>
          </div>
          <div class="match-track"><div class="match-fill" style="width:${r.pct}%"></div></div>
        </div>
        <div class="result-body">${o.body}</div>
        <div class="result-strengths">${o.strengths.map(s => `<span class="strength-tag">${s}</span>`).join('')}</div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="results-wrap">
      <div class="results-header">
        <div class="results-eyebrow">Your results</div>
        <div class="results-title">Your Practice Alignment</div>
        <p class="results-sub">Based on your answers, here are the practice models that align most with your natural strengths, energy, and vision.</p>
      </div>
      ${cards}
      <button class="retake-btn" onclick="retake()">← Retake the quiz</button>
      <a class="calc-link" href="https://harenholistics-commits.github.io/homeopathy_business_model_calculator" target="_blank">Model your income for these practice types →</a>
    </div>`;
}

function startQuiz() { currentQ = 0; render(); }
function selectOption(i) { answers[currentQ] = i; render(); }
function goNext() { if (answers[currentQ] !== undefined) { currentQ++; render(); window.scrollTo({top:0,behavior:'smooth'}); } }
function goBack() { if (currentQ > 0) { currentQ--; render(); window.scrollTo({top:0,behavior:'smooth'}); } }
function retake() { currentQ = -1; answers = {}; render(); window.scrollTo({top:0,behavior:'smooth'}); }

render();
</script>
</body>
</html>
